<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TV Deportes App</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* El body oculta el scroll general para controlar las zonas por separado */
        body {
            background-color: #0b0f19;
            color: #f1f5f9;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- ZONA DEL REPRODUCTOR FIJA --- */
        .player-wrapper {
            flex: 0 0 32vh; /* Fija la altura al 32% de la pantalla del celular */
            min-height: 220px;
            width: 100%;
            background-color: #000;
            position: relative;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        video {
            width: 100%;
            height: 100%;
            background-color: #000;
            object-fit: contain;
        }

        /* --- ZONA DE LA LISTA DESLIZABLE --- */
        .playlist-container {
            flex: 1; /* Ocupa el resto de la pantalla disponible */
            overflow-y: auto; /* Permite deslizar solo la lista */
            background-color: #151e2f;
            display: flex;
            flex-direction: column;
        }

        .playlist-header {
            padding: 15px;
            background-color: #0f172a;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 800;
            color: #fff;
            border-bottom: 1px solid #1e293b;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .playlist-header span {
            color: #0ea5e9;
        }

        .channels {
            list-style: none;
            padding: 15px;
            padding-bottom: 50px;
        }

        /* Diseño de Tarjetas sin logo */
        .channel-card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 14px 18px;
            margin-bottom: 12px;
            background-color: #1e293b;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }

        .channel-card:active {
            transform: scale(0.98);
        }

        .channel-card.active {
            background-color: #0f172a;
            border-color: #0ea5e9;
            box-shadow: 0 0 10px rgba(14, 165, 233, 0.2);
        }

        .channel-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: #f8fafc;
            margin-bottom: 6px;
        }

        .channel-cat {
            font-size: 0.7rem;
            color: #fff;
            background-color: #0ea5e9;
            padding: 3px 10px;
            border-radius: 20px;
            align-self: flex-start;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* Adaptabilidad para PC/Tablets grandes */
        @media (min-width: 768px) {
            body {
                flex-direction: row;
            }
            .player-wrapper {
                flex: 1;
                height: 100vh;
            }
            .playlist-container {
                flex: 0 0 380px;
                border-left: 1px solid #1e293b;
            }
        }
    </style>
</head>
<body>

        // 2. Lógica para extraer los canales del texto y pasarlos por el Proxy
        function parsearListaM3U(texto) {
            const lineas = texto.split('\n');
            const canales = [];
            let canalActual = {};

            for (let linea of lineas) {
                linea = linea.trim();
                if (linea.startsWith('#EXTINF')) {
                    // Extrae el nombre y categoría
                    const matchNombre = linea.match(/tvg-name="([^"]+)"/);
                    canalActual.nombre = matchNombre ? matchNombre[1] : 'Canal Desconocido';
                    const matchCat = linea.match(/group-title="([^"]+)"/);
                    canalActual.categoria = matchCat ? matchCat[1] : 'TV';
                } else if (linea.startsWith('http')) {
                    // TRUCO DE INGENIERÍA: Cambiamos la IP insegura por nuestro proxy seguro de Vercel
                    canalActual.url = linea.replace('http://108.175.13.7', '/api-iptv');
                    
                    // Solo evitamos añadir canales duplicados (los que tienen el mismo nombre en la lista .txt)
                    if(!canales.find(c => c.nombre === canalActual.nombre)){
                        canales.push(canalActual);
                    }
                    canalActual = {}; // Reinicia para el siguiente
                }
            }
            return canales;
        }

        const canales = parsearListaM3U(listaM3U);
        const channelListContainer = document.getElementById('channelList');
        const videoPlayer = document.getElementById('videoPlayer');

        // 3. Función del Reproductor de Video
        function reproducirCanal(url) {
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(videoPlayer);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    videoPlayer.play();
                });
            } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                // Soporte nativo para tu iPhone/Safari
                videoPlayer.src = url;
                videoPlayer.addEventListener('loadedmetadata', function() {
                    videoPlayer.play();
                });
            }
        }

        // 4. Inyectar las tarjetas limpias (Sin logos)
        function iniciarApp() {
            canales.forEach((canal, index) => {
                const li = document.createElement('li');
                li.className = 'channel-card';
                
                li.innerHTML = `
                    <span class="channel-name">${canal.nombre}</span>
                    <span class="channel-cat">${canal.categoria}</span>
                `;

                li.onclick = () => {
                    document.querySelectorAll('.channel-card').forEach(item => item.classList.remove('active'));
                    li.classList.add('active');
                    reproducirCanal(canal.url);
                };

                channelListContainer.appendChild(li);

                // Auto-reproducir el primer canal al cargar la web
                if (index === 0) {
                    li.click();
                }
            });
        }

        document.addEventListener('DOMContentLoaded', iniciarApp);
