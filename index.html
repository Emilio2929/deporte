<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TV Deportes App</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100%;
            width: 100%;
        }

        .player-section {
            flex: 1;
            display: flex;
            background-color: #000;
            position: relative;
        }

        /* Clases para la Pantalla Completa Web (Solución definitiva para iPhone/Android) */
        .player-section.web-fullscreen {
            position: fixed !important;
            top: 0;
            left: 0;
            width: 100vw !important;
            height: 100vh !important;
            z-index: 99999 !important;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Botón personalizado de pantalla completa */
        .fullscreen-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: rgba(56, 189, 248, 0.9);
            color: #fff;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            z-index: 100000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            transition: background-color 0.2s;
        }

        .fullscreen-btn:hover {
            background-color: #38bdf8;
        }

        .playlist-section {
            width: 320px;
            background-color: #1e293b;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #334155;
        }

        .playlist-header {
            padding: 20px;
            background-color: #0f172a;
            border-bottom: 1px solid #334155;
            text-align: center;
        }

        .playlist-header h2 {
            font-size: 1.2rem;
            color: #38bdf8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .channel-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
        }

        .channel-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #334155;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .channel-item:hover, .channel-item.active {
            background-color: #334155;
        }

        .channel-item img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: contain;
            background-color: #fff;
            margin-right: 15px;
            padding: 2px;
        }

        .channel-info {
            display: flex;
            flex-direction: column;
        }

        .channel-name {
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .channel-category {
            font-size: 0.8rem;
            color: #94a3b8;
            background-color: #0f172a;
            padding: 2px 8px;
            border-radius: 12px;
            align-self: flex-start;
        }

        /* DISEÑO OPTIMIZADO PARA MÓVILES */
        @media (max-width: 768px) {
            body {
                overflow: auto;
                height: auto;
            }
            .app-container {
                flex-direction: column;
                height: auto;
            }
            .player-section {
                height: 35vh; 
                position: sticky;
                top: 0;
                z-index: 1000;
            }
            .playlist-section {
                width: 100%;
                height: auto;
                border-left: none;
                border-top: 1px solid #334155;
            }
            .channel-list {
                overflow-y: visible;
            }
            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 6px 10px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Reproductor -->
        <main class="player-section" id="playerSection">
            <!-- Botón flotante para forzar Pantalla Completa Web -->
            <button class="fullscreen-btn" id="fullscreenBtn" onclick="toggleFullscreen()">Pantalla Completa</button>
            
            <!-- iframe con atributo sandbox añadido para bloquear pop-ups de publicidad -->
            <iframe id="videoPlayer" src="" allowfullscreen allow="autoplay; fullscreen; encrypted-media; picture-in-picture" sandbox="allow-scripts allow-same-origin"></iframe>
        </main>

        <!-- Lista de canales -->
        <aside class="playlist-section">
            <div class="playlist-header">
                <h2>TV en Vivo</h2>
            </div>
            <ul class="channel-list" id="channelList">
                <!-- Los canales se inyectan dinámicamente -->
            </ul>
        </aside>
    </div>

    <script>
        const canales = [
            { nombre: "DSPORTS", url: "https://latamvidzfy.org/dsportsar.php", logo: "https://acortar.link/XhOT8x", categoria: "Deportes" },
            { nombre: "DSPORTS 2", url: "https://latamvidzfy.org/dsports2.php", logo: "https://acortar.link/17c3fN", categoria: "Deportes" },
            { nombre: "TyC Sports", url: "https://tvtvhd.com/online/canales.php?stream=tycsports", logo: "https://acortar.link/nXlqlE", categoria: "Deportes" },
            { nombre: "TELEMUNDO", url: "https://tvtvhd.com/online/canales.php?stream=telemundo", logo: "https://acortar.link/h4NUay", categoria: "Deportes" },
            { nombre: "ESPN", url: "https://tvtvhd.com/canales.php?stream=disney2", logo: "https://acortar.link/hUJQo4", categoria: "Deportes" }
        ];

        const channelListContainer = document.getElementById('channelList');
        const videoPlayer = document.getElementById('videoPlayer');
        const playerSection = document.getElementById('playerSection');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        function inicializarApp() {
            canales.forEach((canal, index) => {
                const li = document.createElement('li');
                li.className = 'channel-item';
                
                li.innerHTML = `
                    <img src="${canal.logo}" alt="${canal.nombre}" onerror="this.src='https://via.placeholder.com/45?text=TV'">
                    <div class="channel-info">
                        <span class="channel-name">${canal.nombre}</span>
                        <span class="channel-category">${canal.categoria}</span>
                    </div>
                `;

                li.onclick = () => {
                    reproducirCanal(canal.url);
                    document.querySelectorAll('.channel-item').forEach(item => item.classList.remove('active'));
                    li.classList.add('active');
                    
                    if(window.innerWidth <= 768) {
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                };

                channelListContainer.appendChild(li);

                if (index === 0) {
                    li.click();
                }
            });
        }

        function reproducirCanal(url) {
            videoPlayer.src = url;
        }

        function toggleFullscreen() {
            playerSection.classList.toggle('web-fullscreen');
            if (playerSection.classList.contains('web-fullscreen')) {
                fullscreenBtn.textContent = 'Ver Canales';
            } else {
                fullscreenBtn.textContent = 'Pantalla Completa';
            }
        }

        document.addEventListener('DOMContentLoaded', inicializarApp);
    </script>

</body>
</html>
