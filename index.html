<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TV Deportes App</title>
    <!-- Librería HLS.js para reproducir .m3u8 -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0b0f19;
            color: #f1f5f9;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- ZONA DEL REPRODUCTOR FIJA --- */
        .player-wrapper {
            flex: 0 0 32vh; 
            min-height: 220px;
            width: 100%;
            background-color: #000;
            position: relative;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        video {
            width: 100%;
            height: 100%;
            background-color: #000;
            object-fit: contain;
        }

        /* --- ZONA DE LA LISTA DESLIZABLE --- */
        .playlist-container {
            flex: 1; 
            overflow-y: auto; 
            background-color: #151e2f;
            display: flex;
            flex-direction: column;
        }

        .playlist-header {
            padding: 15px;
            background-color: #0f172a;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 800;
            color: #fff;
            border-bottom: 1px solid #1e293b;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .playlist-header span {
            color: #0ea5e9;
        }

        .channels {
            list-style: none;
            padding: 15px;
            padding-bottom: 50px;
        }

        /* Diseño de Tarjeta */
        .channel-card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 14px 18px;
            margin-bottom: 12px;
            background-color: #1e293b;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }

        .channel-card:active {
            transform: scale(0.98);
        }

        .channel-card.active {
            background-color: #0f172a;
            border-color: #0ea5e9;
            box-shadow: 0 0 10px rgba(14, 165, 233, 0.2);
        }

        .channel-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: #f8fafc;
            margin-bottom: 6px;
        }

        .channel-cat {
            font-size: 0.7rem;
            color: #fff;
            background-color: #0ea5e9;
            padding: 3px 10px;
            border-radius: 20px;
            align-self: flex-start;
            font-weight: 700;
            text-transform: uppercase;
        }

        @media (min-width: 768px) {
            body { flex-direction: row; }
            .player-wrapper { flex: 1; height: 100vh; }
            .playlist-container { flex: 0 0 380px; border-left: 1px solid #1e293b; }
        }
    </style>
</head>
<body>

    <!-- Zona de Video Fija -->
    <div class="player-wrapper">
        <video id="videoPlayer" controls autoplay playsinline></video>
    </div>

    <!-- Zona de Lista -->
    <div class="playlist-container">
        <div class="playlist-header">
            TV <span>DEPORTES</span>
        </div>
        <ul class="channels" id="channelList">
            <!-- El canal se inyectará aquí -->
        </ul>
    </div>

    <script>
        // 1. Arreglo limpio con tu único canal funcional.
        // NOTA: Ya tiene el "/api-iptv/" configurado para saltar el bloqueo de Vercel.
        const canales = [
            {
                nombre: "DSPORTS 1 (Transmisión Activa)",
                categoria: "FÚTBOL",
                url: "/api-iptv/live/f0a78f00-e10c-4465-9359-ccaf4d2d5023/d7bd8a71463f87c7/index.m3u8"
            }
        ];

        const channelListContainer = document.getElementById('channelList');
        const videoPlayer = document.getElementById('videoPlayer');

        // 2. Función del Reproductor de Video
        function reproducirCanal(url) {
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(videoPlayer);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    videoPlayer.play();
                });
            } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                // Soporte nativo para tu iPhone/Safari
                videoPlayer.src = url;
                videoPlayer.addEventListener('loadedmetadata', function() {
                    videoPlayer.play();
                });
            }
        }

        // 3. Renderizar la tarjeta del canal
        function iniciarApp() {
            canales.forEach((canal, index) => {
                const li = document.createElement('li');
                li.className = 'channel-card';
                
                li.innerHTML = `
                    <span class="channel-name">${canal.nombre}</span>
                    <span class="channel-cat">${canal.categoria}</span>
                `;

                li.onclick = () => {
                    document.querySelectorAll('.channel-card').forEach(item => item.classList.remove('active'));
                    li.classList.add('active');
                    reproducirCanal(canal.url);
                };

                channelListContainer.appendChild(li);

                // Auto-reproducir al abrir la página
                if (index === 0) {
                    li.click();
                }
            });
        }

        document.addEventListener('DOMContentLoaded', iniciarApp);
    </script>

</body>
</html>
