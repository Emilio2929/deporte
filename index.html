        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0b0f19;
            color: #f1f5f9;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: row;
            height: 100%;
            width: 100%;
        }

        /* --- ZONA DEL REPRODUCTOR --- */
        .player-wrapper {
            flex: 1;
            background-color: #000;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            background-color: #000;
            object-fit: contain;
        }

        /* --- ZONA DE LA LISTA DE CANALES --- */
        .playlist {
            width: 380px;
            background-color: #151e2f;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #1e293b;
        }

        .playlist-header {
            padding: 20px;
            background-color: #0b0f19;
            text-align: center;
            font-size: 1.3rem;
            font-weight: 800;
            color: #fff;
            border-bottom: 1px solid #1e293b;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .playlist-header span {
            color: #0ea5e9;
        }

        .channels {
            list-style: none;
            overflow-y: auto;
            flex: 1;
            padding: 15px;
        }

        .channel-card {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            margin-bottom: 10px;
            background-color: #1e293b;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }

        .channel-card:active {
            transform: scale(0.97);
        }

        .channel-card.active {
            background-color: #0f172a;
            border-color: #0ea5e9;
        }

        .channel-logo {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: #fff;
            padding: 3px;
            object-fit: contain;
            margin-right: 15px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .channel-info {
            display: flex;
            flex-direction: column;
        }

        .channel-name {
            font-weight: 700;
            font-size: 1rem;
            color: #f8fafc;
            margin-bottom: 4px;
        }

        .channel-cat {
            font-size: 0.65rem;
            color: #0b0f19;
            background-color: #0ea5e9;
            padding: 3px 8px;
            border-radius: 12px;
            align-self: flex-start;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* --- ADAPTABILIDAD PARA MÓVILES --- */
        @media (max-width: 768px) {
            body {
                overflow: auto;
            }
            .app-container {
                flex-direction: column;
            }
            .player-wrapper {
                height: 35vh;
                min-height: 250px;
                position: sticky;
                top: 0;
                z-index: 1000;
                flex: none;
                box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            }
            .playlist {
                width: 100%;
                height: auto;
                border-left: none;
            }
            .channels {
                overflow: visible;
                padding-bottom: 40px;
            }
        }
    </style>
</head>

        const channelListContainer = document.getElementById('channelList');
        const videoPlayer = document.getElementById('videoPlayer');

        function reproducirCanal(url) {
            // Lógica para reproducir el formato .m3u8
            if (Hls.isSupported()) {
                // Para Android / PC
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(videoPlayer);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    videoPlayer.play();
                });
            } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                // Para iPhone / Safari (Nativo)
                videoPlayer.src = url;
                videoPlayer.addEventListener('loadedmetadata', function() {
                    videoPlayer.play();
                });
            }
        }

        function iniciarApp() {
            canales.forEach((canal, index) => {
                const li = document.createElement('li');
                li.className = 'channel-card';
                
                li.innerHTML = `
                    <div class="channel-logo">📺</div>
                    <div class="channel-info">
                        <span class="channel-name">${canal.nombre}</span>
                        <span class="channel-cat">${canal.categoria}</span>
                    </div>
                `;

                // Carga la imagen real si está disponible
                const img = new Image();
                img.src = canal.logo;
                img.onload = () => {
                    li.querySelector('.channel-logo').innerHTML = `<img src="${canal.logo}" style="width:100%; height:100%; object-fit:contain; border-radius:50%;">`;
                };

                li.onclick = () => {
                    // Remover activo de los demás
                    document.querySelectorAll('.channel-card').forEach(item => item.classList.remove('active'));
                    li.classList.add('active');
                    
                    // Iniciar video
                    reproducirCanal(canal.url);
                    
                    // En móviles, hacer scroll hacia el video suavemente
                    if(window.innerWidth <= 768) {
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                };

                channelListContainer.appendChild(li);

                // Auto-reproducir el primer canal al cargar
                if (index === 0) {
                    li.click();
                }
            });
        }

        document.addEventListener('DOMContentLoaded', iniciarApp);
